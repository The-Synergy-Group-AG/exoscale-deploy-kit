<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobTrackerPro — Service Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  header{background:#1e293b;border-bottom:1px solid #334155;padding:1rem 2rem;display:flex;align-items:center;gap:1rem}
  header h1{font-size:1.4rem;font-weight:700;color:#38bdf8}
  header .badge{background:#0ea5e9;color:#fff;font-size:.75rem;padding:.2rem .6rem;border-radius:999px;font-weight:600}
  .summary{display:flex;gap:1rem;padding:1.5rem 2rem;flex-wrap:wrap}
  .stat{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1rem 1.5rem;min-width:140px}
  .stat .label{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
  .stat .value{font-size:2rem;font-weight:700;margin-top:.25rem}
  .stat.healthy .value{color:#22c55e}
  .stat.unhealthy .value{color:#ef4444}
  .stat.pending .value{color:#f59e0b}
  .stat.total .value{color:#38bdf8}
  .controls{padding:0 2rem 1rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
  .controls input{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.5rem 1rem;border-radius:.5rem;font-size:.875rem;width:260px}
  .controls input:focus{outline:none;border-color:#38bdf8}
  .controls button{background:#0ea5e9;color:#fff;border:none;padding:.5rem 1.25rem;border-radius:.5rem;font-size:.875rem;cursor:pointer;font-weight:600}
  .controls button:hover{background:#0284c7}
  .controls button.refresh{background:#1e293b;border:1px solid #334155;color:#94a3b8}
  .controls button.refresh:hover{background:#334155;color:#e2e8f0}
  .controls .last-check{font-size:.75rem;color:#64748b;margin-left:auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem;padding:0 2rem 2rem}
  .card{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1rem;transition:border-color .2s}
  .card:hover{border-color:#475569}
  .card{cursor:pointer}
  .card .name{font-size:.875rem;font-weight:600;color:#e2e8f0;word-break:break-all}
  .card .url{font-size:.7rem;color:#64748b;margin-top:.2rem;word-break:break-all}
  .card .domain-tag{display:inline-block;font-size:.65rem;background:#334155;color:#94a3b8;padding:.1rem .4rem;border-radius:4px;margin-top:.25rem}
  .card .status-row{display:flex;align-items:center;gap:.5rem;margin-top:.75rem}
  .card .ep-panel{display:none;margin-top:.75rem;border-top:1px solid #334155;padding-top:.5rem}
  .card.expanded .ep-panel{display:block}
  .card .ep-panel .ep-item{display:flex;align-items:center;gap:.5rem;padding:.25rem 0;font-size:.75rem}
  .card .ep-panel .ep-method{font-weight:700;min-width:40px}
  .card .ep-panel .ep-method.get{color:#22c55e}
  .card .ep-panel .ep-method.post{color:#f59e0b}
  .card .ep-panel .ep-method.put{color:#3b82f6}
  .card .ep-panel .ep-method.delete{color:#ef4444}
  .card .ep-panel .ep-path{color:#94a3b8}
  .card .ep-panel .ep-try{background:#0ea5e9;color:#fff;border:none;padding:.15rem .5rem;border-radius:4px;font-size:.65rem;cursor:pointer;margin-left:auto}
  .card .ep-panel .ep-try:hover{background:#0284c7}
  .card .ep-panel .ep-result{background:#0f172a;border:1px solid #334155;border-radius:4px;padding:.5rem;margin-top:.35rem;font-size:.7rem;color:#94a3b8;max-height:150px;overflow-y:auto;white-space:pre-wrap;font-family:monospace;display:none}
  .card .ep-panel .docs-link{display:inline-block;font-size:.7rem;color:#38bdf8;margin-top:.5rem;text-decoration:none}
  .card .ep-panel .docs-link:hover{text-decoration:underline}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .dot.ok{background:#22c55e;box-shadow:0 0 6px #22c55e80}
  .dot.err{background:#ef4444;box-shadow:0 0 6px #ef444480}
  .dot.registered{background:#38bdf8;box-shadow:0 0 6px #38bdf880}
  .dot.pending{background:#f59e0b;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .status-text{font-size:.8rem;color:#94a3b8}
  .status-code{margin-left:auto;font-size:.75rem;font-weight:600;color:#64748b}
  .status-code.ok{color:#22c55e}
  .status-code.registered{color:#38bdf8}
  .status-code.err{color:#ef4444}
  footer{text-align:center;padding:1rem;color:#475569;font-size:.75rem;border-top:1px solid #1e293b}
</style>
</head>
<body>
<header>
  <h1>⚡ JobTrackerPro</h1>
  <span class="badge">Service Dashboard</span>
</header>
<div class="summary">
  <div class="stat total"><div class="label">Total</div><div class="value" id="cnt-total">—</div></div>
  <div class="stat healthy"><div class="label">Healthy</div><div class="value" id="cnt-ok">—</div></div>
  <div class="stat unhealthy"><div class="label">Unhealthy</div><div class="value" id="cnt-err">—</div></div>
  <div class="stat pending"><div class="label">Checking</div><div class="value" id="cnt-pend">—</div></div>
</div>
<div class="controls">
  <input type="text" id="filter" placeholder="Filter services…" oninput="renderGrid()">
  <button onclick="checkAll()">▶ Check All</button>
  <button class="refresh" onclick="location.reload()">↺ Reload</button>
  <span class="last-check" id="last-check"></span>
</div>
<div class="grid" id="grid"></div>
<footer>JobTrackerPro · 219 microservices · Exoscale SKS · <span id="ts"></span></footer>

<script>
// Services list — generated from gen_service_manifests (219 services)
// Plan 170: Load service list dynamically from the gateway catalog
// Fallback to hardcoded list if catalog unavailable
let SERVICES = [
  "access-control-service","access-control-service-ai","admin-service","advanced-ai-ml-service",
  "advanced-analytics-bi-service","advanced-ml-pipeline-service","affiliate-manager-service","ai-biological-synthesis-engine",
  "ai-conversation-frontend","ai-ethics-enforcer-category","analytics-dashboards-service","analytics-platform-service",
  "analytics-service","analytics-system","api-gateway-bulk","api-gateway-manager",
  "api-gateway-service","application-pipeline-service","application-service","ats-integration-service",
  "audit-logging-service","auth-service","authentication-middleware-api","autonomous-security-test-suite",
  "autonomous-test-orchestrator","backup-recovery-system","backup-system","backup-system-bulk",
  "biological-analytics-performance-test","biological-computation-accelerator","biological-consciousness-adapter","biological-energy-distribution-category",
  "biological-memory-architecture","biological-memory-system","business-rules-service","career-search-core-service",
  "cdn-integration-service","cdn-optimization-service","cellular-communication-network-bulk","cellular-communication-network-category",
  "certificate-management","circulatory-system-biological","cns-consciousness-core-other","cognitive-assistance-engine",
  "communication-encryptor","comprehensive-endpoint-test-execution","computer-vision-service","configuration-management",
  "consciousness-ai-bridge-ai","consciousness-evolution-state-tracker","consciousness-integration-infrastructure","consciousness-memory-system-other",
  "consciousness-service","consciousness-validation-system","consciousness-validation-system-other","content-management-cms-service",
  "context-awareness-orchestrator","contextual-memory-integrator","credit-system-service","credits-redemption-frontend",
  "credits-service","crm-integration-service","cv-builder-service","cv-documents-infrastructure",
  "cv-generation-service","cvs-service","data-science-platform-ai","data-visualization-service",
  "decision-support-service","deep-learning-accelerator","deep-learning-accelerator-ai","deployment-validator",
  "digestive-system-biological","disaster-recovery-service","docker-compose-test-service","docker-orchestration",
  "document-generator-service","document-management-service","document-processing-ocr-service","email-communications-service",
  "email-integration-service","embeddings-engine","emotional-intelligence-advisor","emotional-intelligence-system",
  "encryption-service-communication","endocrine-system","enterprise-sso-integration-service","environment-provisioning-test-service",
  "etl-pipelines-service","event-processing-pipelines-service","evolutionary-acceleration-engine","execute-complete-369-user-stories",
  "failover-service","filtering-and-search-system","form-management-system","frontend-api-gateway",
  "gamification-engine-service","gamification-frontend","gamification-service","generative-ai-processor",
  "genetic-biological-processor","godhood-consciousness-orchestrator","godhood-consciousness-orchestrator-other","gro-cardano-testing-service",
  "harmony-optimization-system-bulk","harmony-optimization-system-category","immune-system","immune-system-biological",
  "infrastructure-automation","infrastructure-dashboard-bulk","infrastructure-monitor-bulk","infrastructure-monitoring",
  "infrastructure-test-service","integration-bridges-system","intent-recognition-system","interview-intelligence-infrastructure",
  "interview-intelligence-system","interview-prep-frontend","interview-prep-service","job-discovery-service",
  "job-search-service","log-aggregation-system","logging-aggregator","machine-learning-pipelines-service",
  "metabolic-system-orchestrator-bulk","monitoring-system-bulk","natural-language-processor","natural-language-processor-ai",
  "natural-language-processor-category","navigation-system","network-security-gateway","networking-frontend",
  "networking-service","neural-consciousness-amplifier","neural-network-processor","neural-network-processor-ai",
  "neural-network-processor-category","neural-network-validation-service","notification-service","notifications-center-frontend",
  "onboarding-frontend","onboarding-service","openai-api-test-service","payment-billing-frontend",
  "payment-processing-service","payment-processor-service","payment-service","performance-analytics-platform",
  "performance-analyzer-bulk","performance-compliance-test-service","performance-optimization-layer","performance-optimizer",
  "performance-optimizer-bulk","performance-optimizer-category","performance-regression-test-service","personalization-ai-adaptor",
  "portal-integration-hub","predictive-analytics-engine","predictive-analytics-engine-ai","privacy-gdpr-test-service",
  "rav-compliance-frontend","rav-compliance-service","real-time-data-refresher","real-time-sync-infrastructure",
  "referral-tracking-service","regression-detection-service","reinforcement-learning-system","reproductive-system",
  "reproductive-system-biological","resource-manager-bulk","secure-messaging-gateway-communication","security-compliance-test-service",
  "security-gateway","security-gateway-bulk","security-monitoring-system","security-policy-enforcer",
  "self-awareness-integrator","service-health-monitor","service-mesh","service-registry",
  "shared-components-library-frontend","skeletal-system","skill-development-infrastructure","subscription-management-service",
  "subscription-orchestrator-service","subscription-service","swiss-compliance-service","swiss-market-service",
  "tab-sync-service","template-ecosystem-manager","tenant-management-service","test-analytics-dashboard-validation",
  "test-api-rate-limiting-validation","test-community-support-validation","test-comprehensive-analytics-validation","test-course-tracking-validation",
  "test-coverage-analysis-service","test-execution-metrics-service","test-flakiness-analysis-service","test-framework-unittest-integration",
  "test-integration-database-postgresql","test-messaging-queue-validation","test-real-time-communication-validation","test-search-functionality-validation",
  "test-session-management-validation","test-workflow-automation-validation","threat-intelligence","traditional-dashboard-orchestrator",
  "transcendence-achievement-monitor","transcendent-conversation-handler","ui-component-library-service","ultimate-biological-harmony",
  "ultimate-biological-harmony-bulk","unified-consciousness-api","user-profile-manager-service","user-profile-service",
  "vector-store","webhook-integrations-service","workflow-engines-service"
];

const BASE = window.location.origin;
const state = {};

// Plan 170: Try to load the full 224-service catalog dynamically
(async function loadDynamicCatalog() {
  try {
    const r = await fetch(`${BASE}/api/catalog`, {signal: AbortSignal.timeout(5000)});
    const d = await r.json();
    const catalogServices = d.services ? Object.keys(d.services) : [];
    if (catalogServices.length > SERVICES.length) {
      // Convert underscore names to hyphen names to match health check URLs
      SERVICES = catalogServices.map(s => s.replace(/_/g, '-'));
      SERVICES.forEach(s => { if (!state[s]) state[s] = {status:'pending', code:null, ms:null}; });
      renderGrid();
      updateStats();
      console.log(`Dashboard: loaded ${SERVICES.length} services from catalog`);
    }
  } catch(e) {
    console.log('Dashboard: using hardcoded service list (' + SERVICES.length + ')');
  }
})();
SERVICES.forEach(s => state[s] = {status:'pending', code:null, ms:null});

// L64: Load catalog for endpoint interaction
let CATALOG = {};
fetch(`${BASE}/api/catalog`).then(r=>r.json()).then(d=>{CATALOG=d.services||{};}).catch(()=>{});

function slug(s){ return s; }

async function checkService(name){
  const t0 = Date.now();
  try {
    // Try the service health endpoint first
    const r = await fetch(`${BASE}/api/${name}/health`, {signal: AbortSignal.timeout(5000)});
    const ms = Date.now()-t0;
    if (r.ok) {
      state[name] = {status: 'ok', code: r.status, ms};
    } else if (r.status === 503 || r.status === 502) {
      // 503/502 from gateway proxy = service exists but pod not responding
      // This is normal for batch/background services — mark as "registered" not "unhealthy"
      state[name] = {status: 'registered', code: r.status, ms};
    } else {
      state[name] = {status: 'err', code: r.status, ms};
    }
  } catch(e){
    state[name] = {status:'err', code:'ERR', ms: Date.now()-t0};
  }
  updateCard(name);
  updateStats();
}

function updateCard(name){
  const el = document.getElementById('card-'+name);
  if(!el) return;
  const s = state[name];
  el.querySelector('.dot').className = 'dot '+s.status;
  el.querySelector('.status-text').textContent =
    s.status==='ok' ? `${s.ms}ms` :
    s.status==='registered' ? 'Registered' :
    s.status==='err' ? 'Unreachable' : 'Checking…';
  const code = el.querySelector('.status-code');
  code.textContent = s.code||'';
  code.className = 'status-code '+(s.status==='ok'?'ok':s.status==='registered'?'registered':s.status==='err'?'err':'');
}

function updateStats(){
  const vals = Object.values(state);
  document.getElementById('cnt-total').textContent = vals.length;
  document.getElementById('cnt-ok').textContent = vals.filter(v=>v.status==='ok'||v.status==='registered').length;
  document.getElementById('cnt-err').textContent = vals.filter(v=>v.status==='err').length;
  document.getElementById('cnt-pend').textContent = vals.filter(v=>v.status==='pending').length;
  document.getElementById('last-check').textContent = 'Last check: '+new Date().toLocaleTimeString();
}

function renderGrid(){
  const q = document.getElementById('filter').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  SERVICES.filter(s=>s.includes(q)).forEach(name=>{
    const s = state[name];
    const catName = name.replace(/-/g,'_');
    const spec = CATALOG[catName]||CATALOG[name]||{};
    const domain = spec.domain||'';
    const eps = spec.endpoints||[];
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-'+name;
    let epHtml = '';
    eps.forEach((ep,i)=>{
      const m = (ep.method||'GET').toLowerCase();
      const p = ep.path||'/';
      epHtml += `<div class="ep-item"><span class="ep-method ${m}">${m.toUpperCase()}</span><span class="ep-path">${p}</span><button class="ep-try" onclick="event.stopPropagation();tryEndpoint('${name}','${m}','${p}',${i})">Try</button></div><div class="ep-result" id="ep-res-${name}-${i}"></div>`;
    });
    if(!eps.length) epHtml = '<div style="font-size:.75rem;color:#64748b">No endpoints in catalog</div>';
    card.innerHTML = `
      <div class="name">${name}</div>
      ${domain?'<span class="domain-tag">'+domain+'</span>':''}
      <div class="url">/api/${name}/health</div>
      <div class="status-row">
        <div class="dot ${s.status}"></div>
        <span class="status-text">${s.status==='ok'?s.ms+'ms':s.status==='err'?'Unreachable':'Checking…'}</span>
        <span class="status-code ${s.status}">${s.code||''}</span>
      </div>
      <div class="ep-panel">${epHtml}<a class="docs-link" href="/api/${name}/docs" target="_blank">Open API Docs ↗</a></div>`;
    card.onclick = ()=>card.classList.toggle('expanded');
    grid.appendChild(card);
  });
}

async function checkAll(){
  SERVICES.forEach(s=>{ state[s]={status:'pending',code:null,ms:null}; });
  renderGrid(); updateStats();
  // Check in parallel batches of 20
  const batch = 20;
  for(let i=0;i<SERVICES.length;i+=batch){
    await Promise.all(SERVICES.slice(i,i+batch).map(checkService));
  }
}

// L64: Try an endpoint and display result
async function tryEndpoint(svc, method, path, idx){
  const resEl = document.getElementById('ep-res-'+svc+'-'+idx);
  if(!resEl) return;
  resEl.style.display = 'block';
  resEl.textContent = 'Loading...';
  const testPath = path.replace(/\{[^}]+\}/g, 'test-id');
  try {
    const opts = {method: method.toUpperCase(), signal: AbortSignal.timeout(6000)};
    if(['post','put','patch'].includes(method)) {
      opts.headers = {'Content-Type':'application/json'};
      opts.body = '{}';
    }
    const r = await fetch(`${BASE}/api/${svc}${testPath}`, opts);
    const data = await r.json();
    resEl.textContent = `${r.status} ${r.statusText}\n${JSON.stringify(data, null, 2)}`;
    resEl.style.color = r.ok ? '#22c55e' : '#ef4444';
  } catch(e) {
    resEl.textContent = 'Error: ' + e.message;
    resEl.style.color = '#ef4444';
  }
}

document.getElementById('ts').textContent = new Date().toISOString().slice(0,10);
renderGrid();
updateStats();
checkAll();
setInterval(checkAll, 60000); // auto-refresh every 60s
</script>
</body>
</html>
