# =============================================================
# Exoscale Deploy Kit - Configuration
# Lessons Learned v2 -- 219-service deployment
# =============================================================
# LESSON 17 FIX: SG per-instance attachment via API returns 404 -- removed.
# LESSON MEM: Single service hit 77% on small (2GB). Use medium (4GB) nodes.
# LESSON SCALE: 219 services in one pod needs 2Gi+ memory limit.
# Plan 121: node_type_size upgraded to large (8GB) -- OOM fix
# Plan 121: service_version 6 -- docker-jtp:6 (Gateway v7, PROXY_TIMEOUT=2.5s)
# Plan 123 Phase 4: service_version updated to 8 -- docker-jtp:8 (real implementations)
# Plan 123 Phase 5: added dns: section for DNS automation (ISSUE-015)
# Plan 125 Phase 0: autoscaling.min_replicas 2->1 (dev/single-user deployment)
#   autoscaling.max_replicas 10->3 (single user, no need for 10 gateway replicas)
#   database.enabled false (AI-First application -- dual-mode DBaaS is optional)
# Plan 125 Phase 1: service_version 8->9 (docker-jtp:9 with pytest support)
# Plan 125 Phase 2: service_version 9->10 (docker-jtp:10 with service dashboard at /)
# Plan 125 Phase 2b: service_version 10->11 (dashboard moved to /service-dashboard)
# =============================================================
project_name: jtp-test1
service_name: docker-jtp
# Plan 125 L55/L56/L57: service_version 12->13 (domain data + AI-First home + service_client.py)
service_version: '19'
docker_hub_user: iandrewitz
environment: production
exoscale_zone: ch-dk-2
sks_level: starter
sks_cni: calico
sks_addons:
- exoscale-cloud-controller
- metrics-server
node_type_family: standard
node_type_size: large
node_count: 3
node_disk_gb: 50
k8s_namespace: exo-jtp-prod
k8s_replicas: 1
k8s_port: 5000
k8s_service_port: 5000
k8s_nodeport: 30671
load_balancer:
  enabled: true
  type: nlb
ingress:
  enabled: true
  provider: nginx
  tls: true
  domain: jobtrackerpro.ch
  cert_email: andrewitz@gmail.com
database:
  # AI-First application: DBaaS is DUAL-MODE ONLY (Plan 125 Amendment)
  # Set enabled: true only when dual-mode traditional services are being deployed
  enabled: false
  type: mysql
  deployment: managed
  version: '8'
  storage_gb: 20
  replicas: 1
autoscaling:
  enabled: true
  # Plan 125: min_replicas reduced to 1 for dev/single-user deployment
  # Increase to 2+ for production multi-user load
  min_replicas: 1
  # Plan 125: max_replicas reduced to 3 for dev/single-user deployment
  max_replicas: 3
  cpu_target_percent: 70
  memory_target_percent: 80
resources:
  requests:
    cpu: '500'
    memory: '1024'
  limits:
    cpu: '2000'
    memory: 4Gi
monitoring:
  metrics_server: true
pod_disruption_budget:
  enabled: true
  min_available: 1

# ── DNS automation (Task 5.2 -- Plan 123-P5 ISSUE-015) ───────────────────────
# zone_account: 'current' = use deploy API key to update DNS automatically
#               'manual'  = skip DNS automation (operator must update manually)
# When zone_account is 'current', Stage 5c calls update_dns.py --ip <lb-ip>
# PREREQUISITE: DNS zone must be in the SAME Exoscale account as EXO_API_KEY.
#   If zone still lives in the old account, set zone_account: manual and
#   update the A record in the old account's console, then switch to 'current'
#   once the zone is migrated (see Task 5.1 in PHASE_5_IMPLEMENTATION_PLAN.md).
dns:
  enabled: true
  zone_account: current
  domain: jobtrackerpro.ch
  ingress_a_records:
    - name: ""          # @ record (root domain)
      ttl: 300
    - name: www
      ttl: 300

# ── Gateway & HTTP configuration ─────────────────────────────────────────────
gateway:
  proxy_timeout_s: 2.5
  max_connections: 50
  max_keepalive_connections: 10
  keepalive_expiry_s: 5.0

# ── Retry & timeout configuration ────────────────────────────────────────────
timeouts:
  k8s_probe_timeout_s: 5
  k8s_probe_period_s: 30
  k8s_liveness_initial_delay_s: 120
  k8s_readiness_initial_delay_s: 15
  hpa_scaledown_stabilization_s: 300
  hpa_scaleup_stabilization_s: 60
  node_wait_timeout_s: 720
  pod_wait_timeout_s: 300
retries:
  max_nodepool_delete_attempts: 12
  sg_attach_max_attempts: 10
  sg_retry_delay_s: 30

# ── Job scraper configuration ────────────────────────────────────────────────
job_scraper:
  cache_ttl_s: 900
  api_url: 'https://www.jobs.ch/api/v1/public/search'
