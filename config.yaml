project_name: jtp-test1
service_name: docker-jtp
service_version: '79'
docker_hub_user: iandrewitz
environment: production
exoscale_zone: ch-dk-2
sks_level: starter
sks_cni: calico
sks_addons:
- exoscale-cloud-controller
- metrics-server
node_type_family: standard
node_type_size: large
node_count: 4
node_disk_gb: 50
k8s_namespace: exo-jtp-prod
k8s_replicas: 1
k8s_port: 5000
k8s_service_port: 5000
k8s_nodeport: 30671
load_balancer:
  enabled: true
  type: nlb
ingress:
  enabled: true
  provider: nginx
  tls: true
  domain: jobtrackerpro.ch
  cert_email: andrewitz@gmail.com
database:
  enabled: false
autoscaling:
  enabled: true
  min_replicas: 1
  max_replicas: 3
  cpu_target_percent: 70
  memory_target_percent: 80
resources:
  requests:
    cpu: '500'
    memory: '1024'
  limits:
    cpu: '2000'
    memory: 4Gi
monitoring:
  metrics_server: true
pod_disruption_budget:
  enabled: true
  min_available: 1
