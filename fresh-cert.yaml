apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jobtrackerpro-tls
  namespace: exo-jtp-prod
spec:
  secretName: jobtrackerpro-tls
  dnsNames:
  - jobtrackerpro.ch
  - www.jobtrackerpro.ch
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
  usages:
  - digital signature
  - key encipherment
