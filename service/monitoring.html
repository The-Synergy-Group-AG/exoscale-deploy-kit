<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JTP — Monitoring Command Center</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  header{background:#1e293b;border-bottom:1px solid #334155;padding:1rem 2rem;display:flex;align-items:center;gap:1rem}
  header h1{font-size:1.4rem;font-weight:700;color:#38bdf8}
  header .badge{background:#0ea5e9;color:#fff;font-size:.75rem;padding:.2rem .6rem;border-radius:999px;font-weight:600}
  header .uptime{margin-left:auto;font-size:.75rem;color:#64748b}
  .row{display:flex;gap:1rem;padding:1rem 2rem;flex-wrap:wrap}
  .stat{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1rem 1.5rem;min-width:130px;flex:1}
  .stat .label{font-size:.65rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
  .stat .value{font-size:1.8rem;font-weight:700;margin-top:.25rem}
  .stat .sub{font-size:.7rem;color:#64748b;margin-top:.15rem}
  .green{color:#22c55e} .red{color:#ef4444} .blue{color:#38bdf8} .amber{color:#f59e0b} .purple{color:#a78bfa}
  h2{font-size:1rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;padding:1.5rem 2rem .5rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem;padding:0 2rem .5rem}
  .card{background:#1e293b;border:1px solid #334155;border-radius:.5rem;padding:.75rem 1rem}
  .card .name{font-size:.8rem;font-weight:600;color:#e2e8f0}
  .card .meta{font-size:.65rem;color:#64748b;margin-top:.2rem}
  .card .bar{height:6px;border-radius:3px;background:#334155;margin-top:.5rem;overflow:hidden}
  .card .bar .fill{height:100%;border-radius:3px;transition:width .5s}
  .bio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.5rem;padding:0 2rem .5rem}
  .bio-card{background:#1e293b;border:1px solid #334155;border-radius:.5rem;padding:.6rem .8rem;text-align:center}
  .bio-card .system{font-size:.75rem;font-weight:600;text-transform:capitalize}
  .bio-card .health{font-size:1.4rem;font-weight:700;margin-top:.2rem}
  .bio-card .detail{font-size:.6rem;color:#64748b;margin-top:.1rem}
  .pills{display:flex;gap:.5rem;padding:0 2rem .5rem;flex-wrap:wrap}
  .pill{background:#1e293b;border:1px solid #334155;border-radius:999px;padding:.35rem .8rem;font-size:.7rem;font-weight:600}
  .intent-bar{display:flex;align-items:center;gap:.5rem;padding:.2rem 0}
  .intent-bar .name{font-size:.7rem;color:#94a3b8;width:140px;text-align:right}
  .intent-bar .bar-outer{flex:1;height:8px;background:#334155;border-radius:4px;overflow:hidden}
  .intent-bar .bar-inner{height:100%;border-radius:4px;background:#38bdf8;transition:width .5s}
  .intent-bar .count{font-size:.7rem;color:#64748b;width:40px}
  .api-table{width:100%;border-collapse:collapse;margin:0 2rem;max-width:calc(100% - 4rem)}
  .api-table th,.api-table td{padding:.4rem .8rem;text-align:left;font-size:.75rem;border-bottom:1px solid #1e293b}
  .api-table th{color:#64748b;text-transform:uppercase;font-size:.65rem;letter-spacing:.05em}
  .api-table td{color:#e2e8f0}
  .refresh-bar{padding:.5rem 2rem;font-size:.65rem;color:#475569;text-align:right}
</style>
</head>
<body>
<header>
  <span style="font-size:1.2rem">⚡</span>
  <h1>JobTrackerPro</h1>
  <span class="badge">Monitoring</span>
  <span class="uptime" id="uptime">Loading...</span>
</header>

<div class="row" id="top-stats"></div>

<h2>🤖 AI API Calls</h2>
<div class="row" id="api-stats"></div>

<h2>🎯 Intent Distribution</h2>
<div style="padding:0 2rem .5rem" id="intents"></div>

<h2>📦 Artifacts by Category (69 total)</h2>
<div class="grid" id="artifacts"></div>

<h2>💎 12 Benefits</h2>
<div class="grid" id="benefits"></div>

<h2>🧬 11 Biological Systems</h2>
<div class="bio-grid" id="bio-systems"></div>

<h2>⚡ 4 Pillars &amp; Energy Systems</h2>
<div class="row" id="pillars-energy"></div>

<div class="refresh-bar" id="refresh-bar">Auto-refreshes every 30 seconds</div>

<script>
const BASE = window.location.origin;

async function loadData() {
  try {
    const r = await fetch(`${BASE}/monitoring`);
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('uptime').textContent = 'Error: ' + e.message;
  }
}

function render(d) {
  // Uptime
  const mins = Math.floor(d.uptime_seconds / 60);
  const hrs = Math.floor(mins / 60);
  document.getElementById('uptime').textContent =
    `Uptime: ${hrs}h ${mins%60}m | ${d.version} | ${d.agents.total} agents`;

  // Top stats
  const totalApiCalls = d.api_calls.total;
  const totalIntents = Object.values(d.intents).reduce((s,v) => s+v, 0);
  const totalArtifactUsage = Object.values(d.artifacts.by_category).reduce((s,v) => s+v.usage, 0);
  const totalBenefitReqs = Object.values(d.benefits).reduce((s,v) => s+v.requests, 0);
  const bioHealthy = Object.values(d.biological_systems).filter(v => v.health > 0.5).length;

  document.getElementById('top-stats').innerHTML = [
    stat('Services', d.services.total, 'blue', 'All registered'),
    stat('Artifacts', d.artifacts.total, 'blue', `${totalArtifactUsage} total uses`),
    stat('Benefits', Object.keys(d.benefits).length, 'green', `${totalBenefitReqs} requests`),
    stat('Bio Systems', `${bioHealthy}/11`, bioHealthy >= 8 ? 'green' : 'amber', 'Healthy'),
    stat('Agents', `${d.agents.healthy}/${d.agents.total}`, d.agents.degraded === 0 ? 'green' : 'red', `${d.agents.degraded} degraded`),
    stat('AI Calls', totalApiCalls, 'purple', `${d.gateway.ai_requests_error} errors`),
  ].join('');

  // API stats
  document.getElementById('api-stats').innerHTML = [
    stat('Anthropic', d.api_calls.anthropic_total, 'purple', 'Claude Haiku'),
    ...Object.entries(d.api_calls.by_provider).map(([k,v]) => stat(k, v, 'blue', '')),
    stat('Cache', d.gateway.intent_cache_size, 'amber', 'Intent cache'),
  ].join('');

  // Intents
  const maxIntent = Math.max(...Object.values(d.intents), 1);
  document.getElementById('intents').innerHTML = Object.entries(d.intents)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `<div class="intent-bar"><span class="name">${k}</span><div class="bar-outer"><div class="bar-inner" style="width:${v/maxIntent*100}%"></div></div><span class="count">${v}</span></div>`)
    .join('') || '<div style="font-size:.75rem;color:#64748b;padding:.5rem 0">No intents classified yet — send a chat message to start tracking</div>';

  // Artifacts by category
  const cats = d.artifacts.by_category;
  const maxUsage = Math.max(...Object.values(cats).map(v=>v.usage), 1);
  document.getElementById('artifacts').innerHTML = Object.entries(cats)
    .map(([cat, info]) => `<div class="card"><div class="name">${cat}</div><div class="meta">${info.count} artifacts · ${info.usage} uses</div><div class="bar"><div class="fill" style="width:${info.usage/maxUsage*100}%;background:#38bdf8"></div></div></div>`)
    .join('');

  // Benefits
  document.getElementById('benefits').innerHTML = Object.entries(d.benefits)
    .map(([bid, info]) => {
      const ss = info.secret_sauce ? ' ★' : '';
      return `<div class="card"><div class="name">${bid.replace(/_/g,' ')}${ss}</div><div class="meta">${info.requests} requests${info.secret_sauce ? ' · Secret Sauce' : ''}</div></div>`;
    }).join('');

  // Biological systems
  document.getElementById('bio-systems').innerHTML = Object.entries(d.biological_systems)
    .map(([sys, info]) => {
      const pct = Math.round(info.health * 100);
      const color = pct >= 80 ? '#22c55e' : pct >= 50 ? '#f59e0b' : pct > 0 ? '#ef4444' : '#334155';
      return `<div class="bio-card"><div class="system">${sys}</div><div class="health" style="color:${color}">${pct}%</div><div class="detail">${info.active_benefits}/${info.benefits} benefits active</div></div>`;
    }).join('');

  // Pillars + Energy
  document.getElementById('pillars-energy').innerHTML = [
    ...Object.entries(d.pillars).map(([p,w]) =>
      `<div class="stat"><div class="label">${p.replace('_',' ')}</div><div class="value blue">${(w*100).toFixed(0)}%</div><div class="sub">weight</div></div>`
    ),
    ...Object.entries(d.energy_systems).map(([e,info]) =>
      `<div class="stat"><div class="label">${e}</div><div class="value green">${info.benefits}</div><div class="sub">benefits</div></div>`
    ),
  ].join('');

  document.getElementById('refresh-bar').textContent =
    `Last refresh: ${new Date().toLocaleTimeString()} · Auto-refreshes every 30s`;
}

function stat(label, value, color, sub) {
  return `<div class="stat"><div class="label">${label}</div><div class="value ${color}">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
