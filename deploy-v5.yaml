apiVersion: apps/v1
kind: Deployment
metadata:
  name: digestive-system-biological
  namespace: exo-jtp-prod
  labels:
    app: digestive-system-biological
    plan: "120"
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digestive-system-biological
  template:
    metadata:
      labels:
        app: digestive-system-biological
        component: service
    spec:
      imagePullSecrets:
      - name: dockerhub-creds
      containers:
      - name: service
        image: iandrewitz/docker-jtp:5
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: SERVICE_NAME
          value: "digestive_system_biological"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        startupProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
---
