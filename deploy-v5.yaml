apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-jtp-gateway
  namespace: exo-jtp-prod
  labels:
    app: docker-jtp-gateway
    plan: "120"
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-jtp-gateway
  template:
    metadata:
      labels:
        app: docker-jtp-gateway
        component: gateway
    spec:
      imagePullSecrets:
      - name: dockerhub-creds
      containers:
      - name: gateway
        image: iandrewitz/docker-jtp:5
        ports:
        - containerPort: 5000
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: docker-jtp-gateway-svc
  namespace: exo-jtp-prod
  labels:
    app: docker-jtp-gateway
    plan: "120"
    component: gateway
spec:
  type: NodePort
  selector:
    app: docker-jtp-gateway
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    nodePort: 30671
---
