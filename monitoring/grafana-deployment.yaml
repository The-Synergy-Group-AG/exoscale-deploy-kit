## Grafana Deployment — JTP Dashboard
## Plan 170 Gap 15: Auto-deployed by deploy_pipeline.py Stage 5g
## Access via port-forward: kubectl port-forward svc/grafana 3000:3000 -n exo-jtp-prod

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: exo-jtp-prod
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: exo-jtp-prod
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'JTP'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
# Dashboard ConfigMap is created by deploy_monitoring.sh from grafana-dashboard-fleet.json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: exo-jtp-prod
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.1
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "jtp-admin-2026"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/jtp-fleet-dashboard.json"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-fleet
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboard-fleet
          configMap:
            name: grafana-dashboard-fleet
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: exo-jtp-prod
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
