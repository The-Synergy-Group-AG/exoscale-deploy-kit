## Prometheus Configuration — JTP Agent Fleet Monitoring
## Plan 170 Gap 15: Deployed as part of the infrastructure pipeline.
## Scrapes the gateway's /metrics endpoint which exposes all agent metrics.

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: exo-jtp-prod
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Gateway — exposes all JTP metrics
      - job_name: 'jtp-gateway'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['exo-jtp-prod']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: jtp-gateway
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '${1}:5000'
        metrics_path: /metrics
        scrape_interval: 30s

      # All service pods — health metrics
      - job_name: 'jtp-services'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['exo-jtp-prod']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: jtp-gateway
            action: drop
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '${1}:8000'
        metrics_path: /metrics
        scrape_interval: 60s

      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

  # SLA alerting rules (from monitoring/sla_alerts.yml)
  sla_alerts.yml: |
    groups:
      - name: jtp_agent_sla
        rules:
          - alert: AgentFleetDegraded
            expr: jtp_agent_health_degraded > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "JTP agent fleet has degraded agents"

          - alert: HighErrorRate
            expr: rate(jtp_errors_total[5m]) / rate(jtp_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Error rate >5% for {{ $labels.agent_id }}"

          - alert: APISpendHigh
            expr: jtp_api_cost_usd_total > 10
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "API spend >$10 for {{ $labels.agent_id }}"
